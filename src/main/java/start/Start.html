<!doctype html>
<html lang="ja">
  <head>
    <!-- 基本設定 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ページタイトル -->
    <title>スタート画面</title>

    <!-- スタート画面用スタイル -->
    <link rel="stylesheet" href="../../resources/css/style.css" />
  </head>
  <body>
    <!-- ==================================================
            スタート画面全体
        ================================================== -->
    <div id="game-container">
      <!-- 背景表示エリア -->
      <div id="bg-pane"></div>

      <!-- ==================================================
                メインUI
            ================================================== -->
      <div id="ui-container">
        <!-- タイトルロゴ -->
        <img
          id="title-logo"
          src="../../resources/picture/title.png"
          alt="Game Title"
        />
        <div id="button-box">
          <!-- ストーリーモード -->
          <button id="story-btn" class="game-button">▶ストーリー</button>

          <!-- 練習モード -->
          <button id="practice-btn" class="game-button">⚔練習モード</button>

          <!-- ゲーム終了 -->
          <button id="exit-btn" class="game-button">ゲーム終了</button>
        </div>
      </div>

      <!-- ヘルプ画面表示ボタン -->
      <button id="help-btn" class="help-button">？</button>
    </div>

    <!-- メインスクリプト -->
    <script type="module" src="Start.js"></script>
  </body>
</html>
