<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本説明</title>
    <link rel="stylesheet" href="../../resources/css/style.css">
</head>
<body>

    <div id="bg-pane"></div>

    <div class="main-container">
        <div class="panel">
            <div class="title">基本説明</div>
            <hr class="divider">
            
            <div class="page-stack">
                <!-- ページ1：操作 -->
                <div class="page-wrapper" id="page-0">
                    <div class="page-heading">操作</div>
                    <div class="page-content">
                        <div class="move-control-row">
                            <span>移動：</span>
                            <img src="../../resources/picture/WASD.png" alt="WASD">
                            <span>または</span>
                            <img src="../../resources/picture/yazirusi.png" alt="矢印">
                        </div>
                        <div class="spacer" style="height: 6px;"></div>
                        <div class="note-row">
                            <div class="icon-box"></div>
                            <div class="note-text">スマホでの移動：画面スワイプ</div>
                        </div>
                    </div>
                </div>

                <!-- ページ2：アイテム -->
                <div class="page-wrapper" id="page-1">
                    <div class="page-heading">アイテム</div>
                    <div class="page-content">
                        <div class="note-row">
                            <div class="icon-box"><div class="dot-icon"></div></div>
                            <div class="note-text">エサを食べるとスコアが加算されます。</div>
                        </div>
                        <div class="note-row">
                            <div class="icon-box"><img src="../../resources/picture/Chii_Item.png" class="power-pellet-icon" alt="パワーエサ"></div>
                            <div class="note-text">パワーエサを食べるとスコアが加算され、一定時間敵を撃退できます。</div>
                        </div>
                        <div class="fruit-row">
                            <div class="fruit-item"><img src="../../resources/picture/sakuranbo.png"><span>＋100</span></div>
                            <div class="fruit-item"><img src="../../resources/picture/ichigo.png"><span>＋300</span></div>
                            <div class="fruit-item"><img src="../../resources/picture/orange.png"><span>＋500</span></div>
                            <div class="fruit-item"><img src="../../resources/picture/ringo.png"><span>＋700</span></div>
                            <div class="fruit-item"><img src="../../resources/picture/budo.png"><span>＋1000</span></div>
                        </div>
                    </div>
                </div>

                <!-- ページ3：ルール -->
                <div class="page-wrapper" id="page-2">
                    <div class="page-heading">ルール</div>
                    <div class="page-content">
                        <div class="note-row"><div class="note-text">・全てのエサを食べるとステージクリア。</div></div>
                        <div class="note-row"><div class="note-text">・敵に3回触れるとゲームオーバー。</div></div>
                        <div class="note-row"><div class="note-text">・端の通路は「ワープトンネル」で繋がっています。</div></div>
                    </div>
                </div>

                <!-- ページ4：モード -->
                <div class="page-wrapper" id="page-3">
                    <div class="page-heading">モード</div>
                    <div class="page-content">
                        <div class="mode-heading">▶ストーリー</div>
                        <div class="note-text">物語を進めながら遊ぶモードです。</div>
                        <div class="spacer" style="height: 10px;"></div>
                        <div class="mode-heading">⚔練習モード</div>
                        <div class="note-text">エサが無限に再配置され、何度でも遊べます。</div>
                    </div>
                </div>
            </div>

            <div class="indicator">
                <div class="indicator-dot active"></div>
                <div class="indicator-dot"></div>
                <div class="indicator-dot"></div>
                <div class="indicator-dot"></div>
            </div>
        </div>

        <div class="arrow-row">
            <button class="arrow-btn" id="prev-btn">◀</button>
            <button class="arrow-btn" id="next-btn">▶</button>
        </div>

        <button class="help-button back-button-layout" id="back-btn">閉じる
    </button>

    <audio id="bgm" src="../../resources/music/startbgm.mp3" loop></audio>

    <script type="module" src="Help.js"></script>
</body>
</html>
