<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パックマン・ウェブ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1つの共通の土台（JavaFXのStageに相当） -->
    <div id="root">
        <!-- 背景は全画面でずっと共通して動かせる -->
        <div id="bg-pane"></div>

        <!-- この #app の中身を JavaScript (Controller) が動的に書き換えます -->
        <div id="app"></div>
    </div>

    <!-- すべての画面をコントロールするJS -->
    <script src="GameController.js"></script>
</body>
</html>
