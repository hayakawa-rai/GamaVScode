<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>STAGE3 CLEAR</title>

    <!-- CSS（後で追加） -->
    <linkclear3.css
</head>

<body>

    <div id="stageclear-root">

        <div id="button-box">

            <!-- タイトル -->
            <h1 id="title">
                STAGE3 CLEAR!
            </h1>

            <!-- 画像＋説明 -->
            <div id="text-image-box">

                <!-- ハンコ画像 -->
                <img
                    id="imageView"
                    src="../../resources/picture/hanko.png"
                    alt="ハンコ">

                <!-- 説明文 -->
                <div id="text">
                    ハンコを獲得しました！！
                </div>

            </div>

            <!-- スコア -->
            <div id="scoreLabel">
                SCORE : 0
            </div>

            <!-- 次へ -->
            <button
                id="nextButton"
                class="game-button2">

                次のステージへ

            </button>

            <!-- タイトルへ -->
            <button
                id="backButton"
                class="game-button2">

                タイトルへ

            </button>

        </div>

    </div>

    Stageclear3.jsscript>

</body>

</html>
