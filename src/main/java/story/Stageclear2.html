<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字コード -->
    <meta charset="UTF-8" />

    <!-- レスポンシブ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- タイトル -->
    <title>STAGE2 CLEAR</title>

    <!-- 共通CSS -->
    <link rel="stylesheet" href="../../resources/css/style.css" />

    <!-- StageClear専用CSS -->
    <link rel="stylesheet" href="../../resources/css/stageclear.css" />
  </head>

  <body>
    <!-- =========================================
            STAGE CLEAR画面全体
    ========================================= -->
    <div id="stageclear-root">
      <!-- メインコンテンツ -->
      <div id="clear-container">
        <!-- タイトル -->
        <h1 id="clear-title">STAGE2 CLEAR!</h1>

        <!-- 獲得アイテム -->
        <div id="reward-box">
          <img
            id="reward-image"
            src="../../resources/picture/keiyakusho.png"
            alt="契約書"
          />
          <div id="reward-text">契約書を獲得しました！！</div>
        </div>

        <!-- スコア -->
        <div id="score-label">SCORE : 0</div>

        <!-- ボタン -->
        <div id="button-box">
          <button id="next-btn" class="game-button2">次のステージへ</button>
          <button id="title-btn" class="game-button2">タイトルへ</button>
        </div>
      </div>
    </div>

    <!-- StageClear処理 -->
    <script type="module" src="Stageclear2.js"></script>
  </body>
</html>
