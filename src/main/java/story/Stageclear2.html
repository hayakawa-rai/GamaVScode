<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>STAGE2 CLEAR</title>

    stageclear2.css
</head>

<body>

    <div id="stageclear-root">

        <div id="button-box">

            <!-- タイトル -->
            <h1 id="title">
                STAGE2 CLEAR!
            </h1>

            <!-- 画像＋説明 -->
            <div id="text-image-box">

                <!-- 契約書画像 -->
                <img
                    id="imageView"
                    src="../../resources/picture/keiyakusho.png"
                    alt="誓約書">
    

                <!-- 説明文 -->
                <div id="text">
                    契約書を獲得しました！！
                </div>

            </div>

            <!-- スコア -->
            <div id="scoreLabel">
                SCORE : 0
            </div>

            <!-- 次へ -->
            <button
                id="nextButton"
                class="game-button2">

                次のステージへ

            </button>

            <!-- タイトルへ -->
            <button
                id="backButton"
                class="game-button2">

                タイトルへ

            </button>

        </div>

    </div>

    Stageclear2.jsscript>

</body>

</html>
