<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>STAGE1 CLEAR</title>

    <!-- CSS（後で追加） -->
    <link rel="stylesheet" href="stageclear1.css">
</head>

<body>

    <div id="stageclear-root">

        <div id="button-box">

            <!-- タイトル -->
            <h1 id="title">
                STAGE1 CLEAR!
            </h1>

            <!-- 画像＋説明 -->
            <div id="text-image-box">

                <!-- 鍵画像 -->
                <img id="imageView"
                    src="../../resources/picture/kagi.png"
                    alt="鍵">
            
                <!-- 説明文 -->
                <div id="text">
                    鍵を獲得しました！！
                </div>

            </div>

            <!-- スコア -->
            <div id="scoreLabel">
                SCORE : 0
            </div>

            <!-- 次へ -->
            <button
                id="nextButton"
                class="game-button2">

                次のステージへ

            </button>

            <!-- タイトルへ -->
            <button
                id="backButton"
                class="game-button2">

                タイトルへ

            </button>

        </div>

    </div>

    <script src="Stageclear1.js"></script>

</body>

</html>
