<!DOCTYPE html>
<html lang="ja">
 <head>   

    <!-- 文字コード -->
    <meta charset="UTF-8">

    <!-- レスポンシブ対応 -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- タイトル -->
    <title>ゲームオーバー</title>

    <!-- 共通スタイル -->
    <link rel="stylesheet" href="../../resources/css/style.css">

    <!-- GameOver専用CSS -->
    <link rel="stylesheet" href="../../resources/css/gameover.css">
</head>
<body>

<div id="gameover-root">

        <!-- 白い半透明オーバーレイ -->
        <div id="white-overlay"></div>

        <!-- メインエリア -->
        <div id="content-layout">

            <!-- タイトルエリア -->
            <div id="title-box">

                <h1 id="gameover-title"
                    class="gameover-title">
                    GAME OVER
                </h1>

                <div id="score-label">
                    SCORE : 
                </div>

                <div id="new-record-label">
                    NEW RECORD!!
                </div>

            </div>

            <!-- キャラクター＋ボタン -->
           <div id="center-box">

                <img id="character-icon"
                    src="../../resources/picture/syujinkou(gameover).png">

                    <div id="button-column">
                        <button id="retry-btn"
                            class="gameover-button">
                            リトライする
                        </button>

                    <button id="title-btn"
                            class="gameover-button">
                        タイトルへ
                    </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- GameOver処理の起動 -->
    <script type="module">
        import { GameOver } from "./Gameover.js";
        GameOver.init();
    </script>
</body>
</html>
