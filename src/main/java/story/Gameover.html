<!DOCTYPE html>
<html lang="ja">
 </head>   

    <!-- 文字コード -->
    <meta charset="UTF-8">

    <!-- レスポンシブ対応 -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- タイトル -->
    <title>ゲームオーバー</title>

    <!-- 共通スタイル -->
    <link rel="stylesheet" href="../../resources/css/style.css">

    <!-- GameOver専用CSS -->
    <link rel="stylesheet" href="../../resources/css/gameover.css">

<body>

<div id="gameover-root">
        <!-- 背景画像 -->
        <!--img id="gameover.jbg" src="../../resources/picture/gameover.jpg"-->

        <!-- 白い半透明オーバーレイ -->
        <div id="white-overlay"></div>

        <!-- メインエリア -->
        <div id="content-layout">

            <!-- タイトルエリア -->
            <div id="title-box">

                <h1 id="gameover-title"
                    class="gameover-title">
                    GAME OVER
                </h1>

                <div id="score-label">
                    SCORE : 
                </div>

                <div id="new-record-label">
                    NEW RECORD!!
                </div>

            </div>

            <!-- キャラクター＋ボタン -->
           <div id="center-box">

                <img id="character-icon"
                    src="../../resources/picture/syujinkou(gameover).png">

                    <div id="button-column">
                        <button id="retry-btn"
                            class="gameover-button">
                            リトライする
                        </button>

                    <button id="title-btn"
                            class="gameover-button">
                        タイトルへ
                    </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- GameOver処理 -->
    <script type="module"
            src="Gameover.js"></script>

            <!-- 起動用スクリプト -->
<script type="module">
    import { GameOver } from "./Gameover.js";

    // URLのクエリパラメータを取得
    const params = new URLSearchParams(window.location.search);
    const stage = params.get("stage");
    const isPractice = params.get("practice") === "true";
    const score = Number(params.get("score")) || 0;

    // GameOver画面を初期化して起動
    GameOver.create(
        () => {
            // リトライボタンが押された時の遷移先
            window.location.href = isPractice
                ? `../test${stage}/PracticeMain${stage}.html`
                : `../test${stage}/Main${stage}.html`;
        },
        score,
        false // NEW RECORD判定は別途ハイスコア管理と連携する場合は差し替え
    );
</script>

</body>
</html>
