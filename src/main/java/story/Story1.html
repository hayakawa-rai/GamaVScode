<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story 1</title>
    <link rel="stylesheet" href="../../resources/css/style.css">
</head>
<body>
    <div id="game-container">
        <img id="bg" class="bg-image" src="../../resources/picture/emd-nottori.jpg">
        <div id="syujinkou-wrapper" class="sprite-wrapper active" style="left: 0;">
            <img id="syujinkou" class="sprite-img" src="../../resources/picture/syujinkou(hello).png">
        </div>
        <div id="aniki-wrapper" class="sprite-wrapper active" style="right: 0;">
            <img id="aniki" class="sprite-img" src="../../resources/picture/aniki-udekumi.png">
        </div>
        <div id="nari-wrapper" class="sprite-wrapper" style="right: 0;">
            <img id="nari" class="sprite-img" src="../../resources/picture/nari.png">
    </div>  
        <button id="menu-btn"><img src="../../resources/picture/menu.png" alt="Menu"></button>
        
        <div id="message-box-container">
            <div id="message-box">
                <div id="speaker-name"></div>
                <div id="message-text"></div>
                <div id="next-mark" class="story-next-arrow">▼</div>
            </div>
        </div>
        
        <div id="menu-overlay">
            <div class="menu-box">
                <button id="resume-btn" class="game-button2">再開</button>
                <button id="title-btn" class="game-button2">タイトルへ</button>
            </div>
        </div>
        
        <div id="fade-overlay"></div>
    </div>
    <script src="StoryUtils.js"></script>
    <script type="module" src="Story1.js"></script>
</body>
</html>
