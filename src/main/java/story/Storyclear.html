<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY CLEAR</title>
    <link rel="stylesheet" href="../../resources/css/style.css">
</head>
<body>
    <div id="game-container">
        <img id="bg" class="fit-screen" src="../../resources/picture/EMD_picture.jpg" alt="Clear Background">
        <div id="white-filter"></div>

        <div id="story-clear-text" class="center-notice">STORY CLEAR!!</div>

        <div id="roll-container">
            <div id="credits-text"></div>
        </div>

        <div id="thank-box" class="hidden">
            <img id="logo-view" src="../../resources/picture/title.png" alt="Game Logo">
            <div id="thank-you-text" class="center-notice" style="position:static; transform:none;">THANK YOU FOR PLAYING!!</div>
            <button id="title-btn" class="game-button2 hidden" style="background-color: #EAF4FF; color: #2B4A6A; border-color: white; border-radius: 10px;">タイトルへ</button>
        </div>

        <div id="company-box" class="hidden">
            <img id="company-logo" src="../../resources/picture/EMD_logo.png" alt="Company Logo">
            <div id="copyright-text">2026年度 EMD 新卒一同</div>
        </div>
    </div>
    <script src="Storyclear.js"></script>
</body>
</html>
