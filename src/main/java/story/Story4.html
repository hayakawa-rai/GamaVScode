<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story 4</title>
    <link rel="stylesheet" href="../../resources/css/style.css">
</head>
<body>

    <div id="game-container">
        <!-- 1. 背景 -->
        <img id="bg" class="bg-image" src="../../resources/picture/shatyoroom.jpg">
        <!-- 2. キャラクターレイヤー-->
        <div id="syujinkou-wrapper" class="sprite-wrapper active" style="left: 0;">
            <img id="syujinkou" class="sprite-img" src="../../resources/picture/syujinkou(hello).png">
        </div>
        <div id="aniki-wrapper" class="sprite-wrapper" style="right: 0;">
            <img id="aniki" class="sprite-img" src="../../resources/picture/aniki2.png">
        </div>
        
        <div id="message-container">
            <div id="message-box">
                <div id="name-text"></div>
                <div id="dialogue-text"></div>
                <div id="next-mark" class="hidden">▼</div>
            </div>
        </div>

        <!-- メニューボタン -->
        <button id="menu-btn"><img src="../../resources/picture/menu.png" alt="Menu"></button>

        <div id="menu-overlay">
            <div id="menu-box">
                <button id="resume-btn" class="game-button2" style="width: 180px;">再開</button>
                <button id="title-btn" class="game-button2" style="width: 180px;">タイトルへ</button>
            </div>
        </div>

        <div id="fade-rect"></div>
    </div>
    <script type="module" src="Story4.js"></script>
</body>
</html>
