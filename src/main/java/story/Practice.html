<!doctype html>
<html lang="ja">
  <head>
    <!-- 文字コード -->
    <meta charset="UTF-8" />

    <!-- レスポンシブ対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ブラウザタブに表示されるタイトル -->
    <title>練習モード</title>

    <!-- 共通スタイル -->
    <link rel="stylesheet" href="../../resources/css/style.css" />
    <!-- practice用スタイル-->
    <link rel="stylesheet" href="../../resources/css/practice.css" />
    <!-- スマホ版　横対応時の警告スタイルシート-->
    <link rel="stylesheet" href="../../resources/css/OrientationWarning.css" />
  </head>

  <body>
    <!-- ==================================================
         ゲーム画面全体
         ================================================== -->
    <div id="game-container">
      <!-- 背景 -->
      <div id="bg-pane"></div>

      <!-- ==================================================
             トロフィー（ハイスコア表示ボタン）
             ================================================== -->
      <div id="score-info">🏆</div>

      <!-- ==================================================
             ハイスコア表示エリア
             （初期状態ではCSSで非表示）
             ================================================== -->
      <div id="highscore-tooltip">
        ★ HIGH SCORE ★
        <br /><br />
        STAGE1 : 1000
        <br /><br />
        STAGE2 : 2000
        <br /><br />
        STAGE3 : 3000
      </div>

      <!-- ==================================================
             練習モードメインエリア
             ================================================== -->
      <div id="practice-container">
        <!-- タイトル -->
        <div id="practice-title">練習モード</div>

        <!-- ステージ選択ボタン -->
        <div id="stage-box">
          <button id="stage1-btn" class="game-button">STAGE 1</button>

          <button id="stage2-btn" class="game-button">STAGE 2</button>

          <button id="stage3-btn" class="game-button">STAGE 3</button>
        </div>
      </div>

      <!-- タイトル画面へ戻る -->
      <button id="back-btn" class="game-button">タイトルへ</button>
    </div>

    <!-- ハイスコア管理 -->
    <script type="module" src="../common/HighScoreManager.js"></script>

    <!-- Practice画面処理 -->
    <script type="module" src="Practice.js"></script>
  </body>
</html>
