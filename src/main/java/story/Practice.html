<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習モード</title>

    <link rel="stylesheet" href="../../resources/css/style.css">
</head>
<body>

<div id="game-container">
    <!-- 背景 -->
    <div id="bg-pane"></div>

    <!-- トロフィー -->
    <div id="score-info">🏆</div>

    <!-- ハイスコア -->
    <div id="highscore-tooltip">
        ★ HIGH SCORE ★
        <br><br>
        STAGE1 : 1000
        <br><br>
        STAGE2 : 2000
        <br><br>
        STAGE3 : 3000
    </div>

    <!-- メイン -->
    <div id="practice-container">
        <div id="practice-title">練習モード</div>

        <div id="stage-box">
            <button id="stage1-btn" class="game-button">STAGE 1</button>
            <button id="stage2-btn" class="game-button">STAGE 2</button>
            <button id="stage3-btn" class="game-button">STAGE 3</button>
        </div>
    </div>

    <button id="back-btn"   class="game-button">タイトルへ</button>
</div>

<script src="HighScoreManager.js"></script>
<script src="Practice.js"></script>


</body>
</html>
