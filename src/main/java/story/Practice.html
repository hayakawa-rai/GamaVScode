<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Practice</title>

    <!-- CSS -->
    <link rel="stylesheet" href="practice.css">
</head>

<body>

    <div id="practice-root">

        <!-- 背景 -->
        <div id="background-pane"></div>

        <!-- ハイスコア -->
        <div id="score-info">🏆</div>

        <!-- ハイスコア表示 -->
        <div id="high-score-tip"></div>

        <!-- 中央UI -->
        <div id="ui-container">

            <!-- タイトル -->
            <h1 id="title">
                練習モード
            </h1>

            <!-- ステージ選択 -->
            <div id="stage-buttons">

                <button id="btn1" class="game-button">
                    STAGE 1
                </button>

                <button id="btn2" class="game-button">
                    STAGE 2
                </button>

                <button id="btn3" class="game-button">
                    STAGE 3
                </button>

            </div>

        </div>

        <!-- タイトルへ戻る -->
        <button id="backButton" class="game-button">
            タイトルへ
        </button>

    </div>

</body>

</html>
