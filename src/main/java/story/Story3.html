<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story 3</title>
    <!-- 共通スタイル -->
    <link rel="stylesheet" href="../../resources/css/style.css" />
    <!-- スマホ版　横対応時の警告スタイルシート-->
    <link rel="stylesheet" href="../../resources/css/OrientationWarning.css" />
</head>
<body>
    <div id="game-container">
        <!-- 1. 背景 -->
        <img id="bg" class="bg-image" src="../../resources/picture/shatyoroom.jpg">
        <!-- 2. キャラクターレイヤー-->
        <div id="syujinkou-wrapper" class="sprite-wrapper active">
            <img id="syujinkou" class="sprite-img" src="../../resources/picture/syujinkou(hello).png">
        </div>
        <div id="aniki-wrapper" class="sprite-wrapper">
            <img id="aniki" class="sprite-img" src="../../resources/picture/aniki-udekumi.png">
        </div>
        <div id="taku-wrapper" class="sprite-wrapper">
            <img id="taku" class="sprite-img" src="../../resources/picture/taku2.png">
        </div>

        <!-- メニューボタン -->
        <button id="menu-btn"><img src="../../resources/picture/menu.png" alt="Menu"></button>

        <!-- 3. メッセージボックス -->
        <div id="message-box-container">
            <div id="message-box">
                <div id="speaker-name"></div>
                <div id="message-text"></div>
                <div id="next-mark" class="story-next-arrow">▼</div>
            </div>
        </div>

        <!-- 4. メニューオーバーレイ -->
        <div id="menu-overlay">
            <div class="menu-box">
                <div class="volume-container">
                    <span class="vol-icon">🔈</span>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05">
                    <span class="vol-icon">🔊</span>
                </div>
                <button id="resume-btn" class="game-button2">再開</button>
                <button id="title-btn" class="game-button2">タイトルへ</button>
            </div>
        </div>

        <!-- 5. フェードレイヤー -->
        <div id="fade-rect"></div>
    </div>
    <script type="module" src="Story3.js"></script>
</body>
</html>
